name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    name: brew audit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula
        run: brew audit --strict Formula/agentctl.rb

  install:
    name: brew install
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap this repo
        run: brew tap arun-gupta/tap "$(pwd)"

      - name: Install agentctl
        run: brew install arun-gupta/tap/agentctl

      - name: Smoke test
        run: agentctl --version
